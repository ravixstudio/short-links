# Nginx reverse proxy for go.innoventry.in
#
# 1. Point DNS A/AAAA record: go.innoventry.in -> your server/load balancer IP
# 2. Obtain TLS cert (e.g. certbot --nginx -d go.innoventry.in)
# 3. Copy this file to /etc/nginx/sites-available/go.innoventry.in and symlink to sites-enabled

upstream short_links_backend {
    server 127.0.0.1:8002;
    keepalive 32;
}

server {
    listen 80;
    server_name go.innoventry.in;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name go.innoventry.in;

    # ssl_certificate /etc/letsencrypt/live/go.innoventry.in/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/go.innoventry.in/privkey.pem;

    # Optional: restrict create API to Innoventry server IPs
    # location /v1/links {
    #     allow 203.0.113.10;
    #     deny all;
    #     proxy_pass http://short_links_backend;
    #     include proxy_params.conf;
    # }

    location /v1/ {
        proxy_pass http://short_links_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location /health {
        proxy_pass http://short_links_backend;
        access_log off;
    }

    location / {
        proxy_pass http://short_links_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
